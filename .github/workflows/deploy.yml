name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time — cancel any in-progress run for main
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [] # runs independently; CI is a separate workflow

    # Only deploy after the CI workflow passes on the same commit
    # (uses GitHub's check-run API via `workflow_run` — see note below)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail

            APP_DIR="/opt/slack-git-ai-bot"
            PM2_NAME="slack-git-ai-bot"
            HEALTH_URL="http://localhost:3000/health"

            echo "── [1/5] Pull latest code ───────────────────────────"
            cd "$APP_DIR"
            git fetch origin main
            PREV_SHA=$(git rev-parse HEAD)
            git reset --hard origin/main
            NEW_SHA=$(git rev-parse HEAD)
            echo "   $PREV_SHA → $NEW_SHA"

            echo "── [2/5] Install dependencies ───────────────────────"
            npm install --production --silent

            echo "── [3/5] Restart bot ────────────────────────────────"
            pm2 restart "$PM2_NAME" --update-env

            echo "── [4/5] Health check ───────────────────────────────"
            sleep 4
            for i in 1 2 3; do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "   ✅ Health check passed (attempt $i)"
                break
              fi
              echo "   ⚠️  Attempt $i failed (HTTP $STATUS) — retrying in 3s..."
              sleep 3
              if [ "$i" = "3" ]; then
                echo "── ROLLBACK: health check failed, reverting to $PREV_SHA ──"
                git reset --hard "$PREV_SHA"
                npm install --production --silent
                pm2 restart "$PM2_NAME" --update-env
                echo "   Rollback complete. Previous version restored."
                exit 1
              fi
            done

            echo "── [5/5] Done ───────────────────────────────────────"
            pm2 status "$PM2_NAME"
            echo ""
            echo "✅ Deploy complete: $NEW_SHA"
